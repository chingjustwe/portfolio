<!DOCTYPE html>
<html lang="zh-CN" data-style="editorial" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta property="og:image" content="images/link.jpg" />
  <meta property="og:url" content="https://chingjustwe.github.io/portfolio/" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Hanken+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        fontFamily: {
          sans: ['var(--f-body)', 'system-ui', 'sans-serif'],
          serif: ['var(--f-display)', 'Georgia', 'serif'],
          mono: ['var(--f-mono)', 'ui-monospace', 'monospace']
        },
        colors: {
          rust:{50:'#fdf4ef',100:'#fbe6da',200:'#f6c5a6',300:'#ef9d6e',400:'#e8743f',500:'#d8521f',600:'#b8431c',700:'#973718',800:'#7c3018',900:'#682c18'},
          ochre:{50:'#fdf8ec',100:'#f9edca',200:'#f2d98e',300:'#e9bf53',400:'#dfa52f',500:'#c8861f',600:'#a6681a',700:'#854f18',800:'#6e4019',900:'#5d3618'},
          plum:{50:'#f7f1f5',100:'#ebd9e6',200:'#d6b3cd',300:'#bd88b0',400:'#a36297',500:'#8c4a7e',600:'#743a66',700:'#5f304f',800:'#4e2942',900:'#412438'},
          moss:{50:'#f2f6ee',100:'#e0e9d3',200:'#c1d3a4',300:'#9bb876',400:'#7a9d52',500:'#5e8040',600:'#496633',700:'#3a512b',800:'#304325',900:'#293821'}
        }
      }}
    }
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen">
  <div id="app">
    <div id="page-content"></div>
  </div>

  <!-- Project Modal (persistent, shared) -->
  <div id="project-modal" class="fixed inset-0 z-50 hidden items-center justify-center" style="background:rgba(0,0,0,.7); backdrop-filter:blur(4px)">
    <div class="u-elev border u-br-rule u-r-lg max-w-5xl w-full mx-4 flex flex-col relative overflow-hidden" style="max-height:85vh">
      <!-- unified toolbar: project label + zoom controls + close -->
      <div class="flex items-center gap-2 px-4 py-2 border-b u-br-rule shrink-0 u-bg-alt" id="modal-toolbar">
        <span class="u-mono text-[10px] u-dim truncate flex-1" id="modal-project-label"></span>
        <div class="flex items-center gap-0.5 shrink-0">
          <button id="zoom-out" class="u-icon-btn" style="width:28px;height:28px" title="缩小 (Ctrl -)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <span id="zoom-level" class="u-mono text-[10px] u-muted w-9 text-center select-none">100%</span>
          <button id="zoom-in" class="u-icon-btn" style="width:28px;height:28px" title="放大 (Ctrl +)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <button id="zoom-reset" class="u-icon-btn" style="width:28px;height:28px" title="重置缩放 (Ctrl 0)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          </button>
        </div>
        <div class="w-px h-5 shrink-0" style="background:var(--c-rule)"></div>
        <button id="modal-close" class="u-icon-btn shrink-0" style="width:28px;height:28px" title="关闭 (Esc)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <!-- scrollable slide content -->
      <div class="flex-1 min-h-0 overflow-auto" id="modal-slides-wrapper" style="overscroll-behavior:contain">
        <div id="modal-slides" class="flex flex-col"></div>
      </div>
      <div class="flex items-center justify-between px-6 py-3 border-t u-br-rule shrink-0 u-bg-alt">
        <button id="slide-prev" class="flex items-center gap-1.5 px-3 py-1.5 border u-br-rule u-r-sm text-xs u-mono u-muted hover:u-ink transition disabled:opacity-30 disabled:cursor-not-allowed cursor-pointer">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          <span>上一页</span>
        </button>
        <div class="flex items-center gap-3">
          <div id="slide-dots" class="flex gap-1.5"></div>
          <span id="slide-counter" class="text-[11px] u-mono u-dim ml-1"></span>
        </div>
        <button id="slide-next" class="flex items-center gap-1.5 px-3 py-1.5 border u-br-rule u-r-sm text-xs u-mono u-muted hover:u-ink transition disabled:opacity-30 disabled:cursor-not-allowed cursor-pointer">
          <span>下一页</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Fixed controls (persistent, shared) -->
  <div class="fixed bottom-6 right-6 z-[60] flex flex-col gap-2">
    <button id="slide-toggle" class="u-icon-btn" title="进入幻灯片模式 (P)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    </button>
    <button id="back-to-top" class="u-icon-btn" title="回到顶部">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    </button>
  </div>

  <div id="slide-hint" class="fixed bottom-6 left-6 z-[60] hidden items-center gap-2.5 px-3.5 py-2 border u-br-rule u-r-sm text-xs u-mono u-elev"></div>

  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/core.js"></script>
  <script src="theme/theme-original.js"></script>
  <script src="theme/theme-editorial.js"></script>
  <script>Portfolio.init();</script>
</body>
</html>
